# PCT 125 - Time Machine SMB target
# Samba share for macOS Time Machine backups (vfs_fruit + Avahi mDNS)
#
# Created: 2026-05-03
# Template: debian-13-standard_13.1-2_amd64.tar.zst (Samba 4.22.x)
#
# Resources:
#   - 1 GiB RAM, 512 MiB swap
#   - 2 vCPU
#   - 8 GiB rootfs (OS + samba only)
#   - 500 GiB mp0 mount at /srv/timemachine (backup data)
#
# Network:
#   - Static IP: 192.168.1.151/24
#   - Gateway: 192.168.1.1
#   - Firewall enabled
#
# To create (run on cortech master):
#   pct create 125 local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst \
#     --hostname timemachine \
#     --memory 1024 \
#     --swap 512 \
#     --cores 2 \
#     --rootfs local-lvm:8 \
#     --mp0 local-lvm:500,mp=/srv/timemachine,backup=0 \
#     --net0 name=eth0,bridge=vmbr0,ip=192.168.1.151/24,gw=192.168.1.1,firewall=1 \
#     --unprivileged 1 \
#     --features nesting=1 \
#     --ostype debian \
#     --onboot 1 \
#     --start 0
#
# Post-create:
#   pct start 125
#   pct push 125 timemachine/setup.sh /root/setup.sh
#   pct push 125 timemachine/smb.conf /etc/samba/smb.conf
#   pct push 125 timemachine/timemachine.service /etc/avahi/services/timemachine.service
#   pct exec 125 -- bash /root/setup.sh
#   # Then set SMB password for the 'tm' user:
#   pct exec 125 -- smbpasswd -a tm

arch: amd64
cores: 2
features: nesting=1
hostname: timemachine
memory: 1024
swap: 512
net0: name=eth0,bridge=vmbr0,firewall=1,ip=192.168.1.151/24,gw=192.168.1.1
rootfs: local-lvm:vm-125-disk-0,size=8G
mp0: local-lvm:vm-125-disk-1,mp=/srv/timemachine,size=500G,backup=0
unprivileged: 1
ostype: debian
onboot: 1
tags: storage;backup
