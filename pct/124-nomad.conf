# PCT 124 - Project N.O.M.A.D.
# Offline-first self-hosted knowledge and education server
# https://github.com/Crosstalk-Solutions/project-nomad
#
# Created: 2026-03-23
# Template: ubuntu-22.04-standard_22.04-1_amd64.tar.zst
#
# Resources:
#   - 4 GiB RAM
#   - 4 vCPU
#   - 32 GiB disk
#   - 512 MiB swap
#
# Features:
#   - nesting=1: Required for Docker-in-LXC
#   - keyctl=1: Required for Docker overlay storage
#   - unprivileged=1: Security best practice
#
# Network:
#   - Static IP: 192.168.1.150/24
#   - Gateway: 192.168.1.1
#   - Firewall enabled
#
# To create:
#   pct create 124 local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst \
#     --hostname nomad \
#     --memory 4096 \
#     --swap 512 \
#     --cores 4 \
#     --rootfs local-lvm:32 \
#     --net0 name=eth0,bridge=vmbr0,ip=192.168.1.150/24,gw=192.168.1.1,firewall=1 \
#     --unprivileged 1 \
#     --features nesting=1,keyctl=1 \
#     --ostype ubuntu \
#     --start 0
#
# Post-create:
#   pct start 124
#   pct exec 124 -- bash -c "apt update && apt upgrade -y"
#   pct exec 124 -- apt install -y curl git
#   # Install Docker
#   pct exec 124 -- bash -c "curl -fsSL https://get.docker.com | sh"
#   # Clone infra repo and deploy
#   pct exec 124 -- bash -c "mkdir -p /opt/project-nomad && cd /opt/project-nomad && \
#     cp /path/to/docker-compose.yaml . && \
#     cp /path/to/.env.example .env && \
#     # Edit .env and fill in real values \
#     docker compose up -d"

arch: amd64
cores: 4
features: nesting=1,keyctl=1
hostname: nomad
memory: 4096
swap: 512
net0: name=eth0,bridge=vmbr0,firewall=1,ip=192.168.1.150/24,gw=192.168.1.1
rootfs: local-lvm:vm-124-disk-0,size=32G
unprivileged: 1
onboot: 1
tags: services
