# PCT 126 - Claude Code + Telegram host
# Persistent host running Claude Code in Telegram-channel mode.
# See claude-telegram/README.md for the full runbook.
#
# Created: 2026-06-18
# Template: ubuntu-24.04-standard_24.04-1_amd64.tar.zst
#
# Resources:
#   - 2 GiB RAM
#   - 2 vCPU
#   - 16 GiB disk
#   - 512 MiB swap
#
# Features:
#   - nesting=1: lets the systemd-in-LXC + Claude Code installer behave
#   - keyctl=1:  matches the other service LXCs
#   - unprivileged=1: security best practice
#
# Network:
#   - Static IP: 192.168.1.153/24
#   - Gateway: 192.168.1.1
#   - Firewall enabled
#
# To create (on cortech master):
#   pct create 126 local:vztmpl/ubuntu-24.04-standard_24.04-1_amd64.tar.zst \
#     --hostname claude-telegram \
#     --memory 2048 \
#     --swap 512 \
#     --cores 2 \
#     --rootfs local-lvm:16 \
#     --net0 name=eth0,bridge=vmbr0,ip=192.168.1.153/24,gw=192.168.1.1,firewall=1 \
#     --unprivileged 1 \
#     --features nesting=1,keyctl=1 \
#     --ostype ubuntu \
#     --start 0
#
# Post-create (push this repo's claude-telegram/ dir into the guest, then):
#   pct start 126
#   pct push 126 claude-telegram/setup.sh /root/setup.sh
#   pct push 126 claude-telegram/claude-telegram.service          /root/claude-telegram.service
#   pct push 126 claude-telegram/claude-telegram-restart.service  /root/claude-telegram-restart.service
#   pct push 126 claude-telegram/claude-telegram-restart.timer    /root/claude-telegram-restart.timer
#   pct exec 126 -- bash /root/setup.sh
#   # then do the one-time interactive steps in claude-telegram/README.md

arch: amd64
cores: 2
features: nesting=1,keyctl=1
hostname: claude-telegram
memory: 2048
swap: 512
net0: name=eth0,bridge=vmbr0,firewall=1,ip=192.168.1.153/24,gw=192.168.1.1
rootfs: local-lvm:vm-126-disk-0,size=16G
unprivileged: 1
onboot: 1
tags: services
