[global]
   workgroup = WORKGROUP
   server string = Cortech Time Machine
   netbios name = TIMEMACHINE
   security = user
   map to guest = never

   # Force modern protocol — Time Machine struggles with anything older.
   server min protocol = SMB3
   client min protocol = SMB3

   # Logging
   log file = /var/log/samba/log.%m
   max log size = 1000
   log level = 1

   # macOS / Time Machine: see vfs_fruit(8) and the SambaWiki Mac OS X page.
   # vfs object order matters; aio_pthread last keeps backup scans from stalling.
   vfs objects = catia fruit streams_xattr aio_pthread
   fruit:aapl = yes
   fruit:model = MacSamba
   fruit:metadata = stream
   fruit:nfs_aces = no
   fruit:copyfile = no
   fruit:veto_appledouble = no
   fruit:posix_rename = yes
   fruit:wipe_intentionally_left_blank_rfork = yes
   fruit:delete_empty_adfiles = yes

   ea support = yes
   inherit permissions = yes

   # Avahi handles mDNS; let it own the advertisement.
   multicast dns register = no

[TimeMachine]
   comment = Time Machine Backup
   path = /srv/timemachine
   valid users = tm
   browseable = yes
   writable = yes
   create mask = 0600
   directory mask = 0700

   # Per-share vfs objects OVERRIDE the global list, so repeat them.
   vfs objects = catia fruit streams_xattr aio_pthread
   fruit:time machine = yes
   fruit:time machine max size = 450G

   # Time Machine wants exclusive control of locking semantics.
   durable handles = yes
   kernel oplocks = no
   kernel share modes = no
   posix locking = no
