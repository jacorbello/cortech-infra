apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: plotlens-runner
  namespace: actions-runner-system
spec:
  replicas: 3
  template:
    spec:
      repository: Family-Friendly-Inc/plotlens
      labels:
        - self-hosted
        - linux
        - plotlens-deploy
        - jarvis-deploy
      hostAliases:
        - hostnames:
            - harbor.corbello.io
          ip: 192.168.1.100
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
          ephemeral-storage: 1Gi
        limits:
          cpu: "4"
          memory: 8Gi
          ephemeral-storage: 4Gi
      dockerdContainerResources:
        requests:
          cpu: 500m
          memory: 1Gi
          ephemeral-storage: 4Gi
        limits:
          cpu: "2"
          memory: 4Gi
          ephemeral-storage: 12Gi
      tolerations:
        - effect: NoSchedule
          key: node.kubernetes.io/lifecycle
          operator: Equal
          value: ephemeral
      initContainers:
        - name: install-kubectl
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
              chmod +x kubectl
              mv kubectl /tools/kubectl
          volumeMounts:
            - name: tools
              mountPath: /tools
      volumeMounts:
        - name: tools
          mountPath: /usr/local/bin/kubectl
          subPath: kubectl
      volumes:
        - name: tools
          emptyDir: {}
