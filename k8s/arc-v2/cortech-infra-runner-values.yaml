githubConfigUrl: "https://github.com/jacorbello/cortech-infra"

githubConfigSecret: arc-github-app-jacorbello

runnerScaleSetName: "cortech-infra-runner"

scaleSetLabels:
  - "cortech-infra-runner"

minRunners: 1
maxRunners: 3

containerMode:
  type: "dind"

template:
  spec:
    terminationGracePeriodSeconds: 30
    nodeSelector:
      node-type: worker
    imagePullSecrets:
      - name: harbor-registry
    hostAliases:
      - hostnames:
          - harbor.corbello.io
        ip: 192.168.1.100
    initContainers:
      - name: setup-ssh-keys
        image: busybox
        command:
          - sh
          - -c
          - |
            cp /secret-mount/id_ed25519 /ssh-keys/id_ed25519
            cp /secret-mount/known_hosts /ssh-keys/known_hosts
            chmod 600 /ssh-keys/id_ed25519
            chmod 644 /ssh-keys/known_hosts
            chown 1001:1001 /ssh-keys/id_ed25519 /ssh-keys/known_hosts
        volumeMounts:
          - name: proxy-ssh-key
            mountPath: /secret-mount
            readOnly: true
          - name: ssh-keys
            mountPath: /ssh-keys
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: RUNNER_GRACEFUL_STOP_TIMEOUT
            value: "15"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 10Gi
        volumeMounts:
          - name: ssh-keys
            mountPath: /ssh-keys
    volumes:
      - name: proxy-ssh-key
        secret:
          secretName: cortech-infra-proxy-ssh-key
          defaultMode: 0400
      - name: ssh-keys
        emptyDir: {}

controllerServiceAccount:
  namespace: arc-systems
  name: arc-v2-gha-rs-controller
