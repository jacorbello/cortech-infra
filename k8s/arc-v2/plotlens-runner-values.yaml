githubConfigUrl: "https://github.com/Family-Friendly-Inc/plotlens"

githubConfigSecret: arc-github-app-fff

runnerScaleSetName: "plotlens-runner"

scaleSetLabels:
  - "plotlens-runner"

minRunners: 3
maxRunners: 10

containerMode:
  type: "dind"

template:
  spec:
    terminationGracePeriodSeconds: 30
    nodeSelector:
      node-type: worker
    imagePullSecrets:
      - name: harbor-registry
    tolerations:
      - effect: NoSchedule
        key: node.kubernetes.io/lifecycle
        operator: Equal
        value: ephemeral
    hostAliases:
      - hostnames:
          - harbor.corbello.io
        ip: 192.168.1.100
    initContainers:
      - name: install-kubectl
        image: curlimages/curl:8.5.0
        command:
          - sh
          - -c
          - |
            set -euo pipefail
            KUBECTL_VERSION="v1.31.0"
            BASE_URL="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64"
            curl -fL --retry 3 --retry-delay 5 -o kubectl "${BASE_URL}/kubectl"
            curl -fL --retry 3 --retry-delay 5 -o kubectl.sha256 "${BASE_URL}/kubectl.sha256"
            echo "$(cat kubectl.sha256)  kubectl" | sha256sum -c -
            chmod +x kubectl
            mv kubectl /tools/kubectl
        volumeMounts:
          - name: tools
            mountPath: /tools
    containers:
      - name: runner
        image: harbor.corbello.io/arc/plotlens-runner:v1
        command: ["/home/runner/run.sh"]
        env:
          - name: RUNNER_GRACEFUL_STOP_TIMEOUT
            value: "15"
        resources:
          requests:
            cpu: "1"
            memory: 3Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: "4"
            memory: 12Gi
            ephemeral-storage: 20Gi
        volumeMounts:
          - name: tools
            mountPath: /usr/local/bin/kubectl
            subPath: kubectl
    volumes:
      - name: tools
        emptyDir: {}

controllerServiceAccount:
  namespace: arc-systems
  name: arc-v2-gha-rs-controller
