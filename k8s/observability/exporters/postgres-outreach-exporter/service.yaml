apiVersion: v1
kind: Service
metadata:
  name: postgres-outreach-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: postgres-outreach-exporter
    app.kubernetes.io/component: exporter
    release: prometheus
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres-outreach-exporter
