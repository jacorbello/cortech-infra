apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: arboretum-health-secrets
  namespace: arboretum-health
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local
  syncConfig:
    resyncInterval: "60s"
  authentication:
    universalAuth:
      secretsScope:
        projectId: c00e26a9-9389-4cc8-9b74-75f936dfeb81
        envSlug: dev
        secretsPath: /arboretum-health
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator
  managedSecretReference:
    secretName: arboretum-health-secrets
    secretNamespace: arboretum-health
    secretType: Opaque
    creationPolicy: Orphan
