apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: arboretum-health
  labels:
    app: wordpress
    app.kubernetes.io/part-of: arboretum-health
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
        app.kubernetes.io/part-of: arboretum-health
    spec:
      securityContext:
        fsGroup: 33
      containers:
        - name: wordpress
          image: wordpress:6.9.4-php8.3-apache
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb:3306
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_DB_PASSWORD
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('FORCE_SSL_ADMIN', true);
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                    $_SERVER['HTTPS'] = 'on';
                }
            - name: WORDPRESS_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_AUTH_KEY
            - name: WORDPRESS_SECURE_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_SECURE_AUTH_KEY
            - name: WORDPRESS_LOGGED_IN_KEY
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_LOGGED_IN_KEY
            - name: WORDPRESS_NONCE_KEY
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_NONCE_KEY
            - name: WORDPRESS_AUTH_SALT
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_AUTH_SALT
            - name: WORDPRESS_SECURE_AUTH_SALT
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_SECURE_AUTH_SALT
            - name: WORDPRESS_LOGGED_IN_SALT
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_LOGGED_IN_SALT
            - name: WORDPRESS_NONCE_SALT
              valueFrom:
                secretKeyRef:
                  name: arboretum-health-secrets
                  key: WORDPRESS_NONCE_SALT
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: wordpress-content
              mountPath: /var/www/html/wp-content
            - name: php-uploads
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
              readOnly: true
      volumes:
        - name: wordpress-content
          persistentVolumeClaim:
            claimName: wordpress-content
        - name: php-uploads
          configMap:
            name: wordpress-php-uploads
            items:
              - key: uploads.ini
                path: uploads.ini
