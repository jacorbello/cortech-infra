apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arboretum-health
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacorbello/cortech-infra.git
    targetRevision: main
    path: apps/wordpress/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: arboretum-health
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
