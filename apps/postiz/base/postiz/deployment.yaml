apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz
  namespace: plotlens-marketing
  labels:
    app: postiz
    app.kubernetes.io/part-of: postiz
spec:
  replicas: 1
  strategy:
    type: Recreate  # avoid two instances stomping the DB during rolling update
  selector:
    matchLabels:
      app: postiz
  template:
    metadata:
      labels:
        app: postiz
    spec:
      containers:
        - name: postiz
          image: ghcr.io/gitroomhq/postiz-app:v2.21.9
          ports:
            - name: http
              containerPort: 5000   # Postiz frontend
            - name: api
              containerPort: 3000   # Postiz backend API
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_JWT_SECRET
            - name: MAIN_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_MAIN_URL
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_FRONTEND_URL
            - name: NEXT_PUBLIC_BACKEND_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: POSTIZ_NEXT_PUBLIC_BACKEND_URL
            - name: MASTODON_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: MASTODON_URL
            - name: MASTODON_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: MASTODON_CLIENT_ID
            - name: MASTODON_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: MASTODON_CLIENT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: OPENAI_API_KEY
            # Postiz reads X_API_KEY/X_API_SECRET; Infisical /postiz stores them as X_CONSUMER_KEY/X_SECRET_KEY
            - name: X_API_KEY
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: X_CONSUMER_KEY
            - name: X_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-secrets
                  key: X_SECRET_KEY
          envFrom:
            - configMapRef:
                name: postiz-config
          volumeMounts:
            - name: media
              mountPath: /uploads   # nginx.conf in the Postiz image serves alias /uploads/
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 8Gi   # Postiz all-in-one: backend + Next.js frontend + 28 Temporal workers
          readinessProbe:
            httpGet:
              path: /
              port: api   # probe backend directly (port 3000) — returns "App is running!"
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: api
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: postiz-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postiz-media
  namespace: plotlens-marketing
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-node3
  resources:
    requests:
      storage: 20Gi
