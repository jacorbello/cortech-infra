apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postiz
  namespace: plotlens-marketing
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: postiz
  endpoints:
    - port: api
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - plotlens-marketing
