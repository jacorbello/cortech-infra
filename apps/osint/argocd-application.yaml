apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osint-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacorbello/cortech-infra.git
    targetRevision: main
    path: apps/osint/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: osint
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
