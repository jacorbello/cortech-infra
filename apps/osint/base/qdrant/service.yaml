apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: osint
  labels:
    app: qdrant
    app.kubernetes.io/part-of: osint-platform
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
