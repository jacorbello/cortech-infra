apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: osint
  labels:
    app: qdrant
    app.kubernetes.io/part-of: osint-platform
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
        app.kubernetes.io/part-of: osint-platform
    spec:
      containers:
        - name: qdrant
          image: harbor.corbello.io/dockerhub-cache/qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              name: http
              protocol: TCP
            - containerPort: 6334
              name: grpc
              protocol: TCP
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
