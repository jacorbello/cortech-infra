apiVersion: v1
kind: ServiceAccount
metadata:
  name: osint-core
  namespace: osint
  labels:
    app.kubernetes.io/part-of: osint-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: osint-job-manager
  namespace: osint
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "list", "get", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osint-core-job-manager
  namespace: osint
subjects:
  - kind: ServiceAccount
    name: osint-core
    namespace: osint
roleRef:
  kind: Role
  name: osint-job-manager
  apiGroup: rbac.authorization.k8s.io
