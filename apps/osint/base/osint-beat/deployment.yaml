apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint-beat
  namespace: osint
  labels:
    app: osint-beat
    app.kubernetes.io/part-of: osint-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: osint-beat
  template:
    metadata:
      labels:
        app: osint-beat
        app.kubernetes.io/part-of: osint-platform
    spec:
      serviceAccountName: osint-core
      priorityClassName: osint-core
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - core-app
                      - compute
      containers:
        - name: osint-beat
          image: harbor.corbello.io/osint/osint-core:latest
          command:
            - celery
            - "-A"
            - osint_core.workers.celery_app
            - beat
            - "--loglevel=info"
          env:
            - name: OSINT_DATABASE_URL
              value: "postgresql+asyncpg://osint:osint@postgres:5432/osint"
            - name: OSINT_REDIS_URL
              value: "redis://redis:6379/0"
            - name: OSINT_CELERY_BROKER_URL
              value: "redis://redis:6379/1"
            - name: OSINT_CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
            - name: OSINT_QDRANT_HOST
              value: "qdrant"
            - name: OSINT_OLLAMA_URL
              value: "http://ollama:11434"
            - name: OSINT_MINIO_ENDPOINT
              value: "minio:9000"
            - name: OSINT_GOTIFY_URL
              value: "http://gotify/message"
            - name: OSINT_KEYCLOAK_URL
              value: "https://keycloak.corbello.io"
            - name: OSINT_PLAN_DIR
              value: "/app/plans"
            - name: OSINT_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
