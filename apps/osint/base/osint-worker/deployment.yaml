apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint-worker
  namespace: osint
  labels:
    app: osint-worker
    app.kubernetes.io/part-of: osint-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osint-worker
  template:
    metadata:
      labels:
        app: osint-worker
        app.kubernetes.io/part-of: osint-platform
    spec:
      serviceAccountName: osint-core
      priorityClassName: osint-core
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - core-app
                      - compute
      containers:
        - name: osint-worker
          image: harbor.corbello.io/osint/osint-core:latest
          command:
            - celery
            - "-A"
            - osint_core.workers.celery_app
            - worker
            - "--loglevel=info"
            - "-Q"
            - "osint,ingest,enrich,score,notify,digest"
          env:
            - name: OSINT_DATABASE_URL
              value: "postgresql+asyncpg://osint:osint@postgres:5432/osint"
            - name: OSINT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: REDIS_URL
            - name: OSINT_CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: CELERY_BROKER_URL
            - name: OSINT_CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: CELERY_RESULT_BACKEND
            - name: OSINT_QDRANT_HOST
              value: "qdrant"
            - name: OSINT_VLLM_URL
              value: "http://vllm-inference.inference.svc.cluster.local:8000"
            - name: OSINT_LLM_MODEL
              value: "meta-llama/Llama-3.2-3B-Instruct"
            - name: OSINT_MINIO_ENDPOINT
              value: "minio:9000"
            - name: OSINT_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: MINIO_ACCESS_KEY
            - name: OSINT_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: MINIO_SECRET_KEY
            - name: OSINT_GOTIFY_URL
              value: "http://gotify/message"
            - name: OSINT_KEYCLOAK_URL
              value: "https://keycloak.corbello.io"
            - name: OSINT_PLAN_DIR
              value: "/app/plans"
            - name: OSINT_ACLED_EMAIL
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: ACLED_EMAIL
            - name: OSINT_ACLED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: ACLED_PASSWORD
            - name: OSINT_XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: XAI_API_KEY
            - name: OSINT_LOG_LEVEL
              value: "INFO"
            - name: OSINT_LLM_PROVIDER
              value: "groq"
            - name: OSINT_GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: GROQ_API_KEY
            - name: OSINT_COURTLISTENER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: COURTLISTENER_API_KEY
            - name: OSINT_RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: RESEND_API_KEY
            - name: CAL_REPORT_RECIPIENT_1
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: CAL_REPORT_RECIPIENT_1
            - name: CAL_REPORT_RECIPIENT_2
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: CAL_REPORT_RECIPIENT_2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
