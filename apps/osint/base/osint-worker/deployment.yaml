apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint-worker
  namespace: osint
  labels:
    app: osint-worker
    app.kubernetes.io/part-of: osint-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osint-worker
  template:
    metadata:
      labels:
        app: osint-worker
        app.kubernetes.io/part-of: osint-platform
    spec:
      serviceAccountName: osint-core
      priorityClassName: osint-core
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - core-app
                      - compute
      containers:
        - name: osint-worker
          image: harbor.corbello.io/osint/osint-core:latest
          command:
            - celery
            - "-A"
            - osint_core.workers.celery_app
            - worker
            - "--loglevel=info"
            - "-Q"
            - "osint,ingest,enrich,score,notify"
          env:
            - name: OSINT_DATABASE_URL
              value: "postgresql+asyncpg://osint:osint@postgres:5432/osint"
            - name: OSINT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: redis-url
            - name: OSINT_CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: celery-broker-url
            - name: OSINT_CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: celery-result-backend
            - name: OSINT_QDRANT_HOST
              value: "qdrant"
            - name: OSINT_OLLAMA_URL
              value: "http://ollama:11434"
            - name: OSINT_MINIO_ENDPOINT
              value: "minio:9000"
            - name: OSINT_GOTIFY_URL
              value: "http://gotify/message"
            - name: OSINT_KEYCLOAK_URL
              value: "https://keycloak.corbello.io"
            - name: OSINT_PLAN_DIR
              value: "/app/plans"
            - name: OSINT_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
