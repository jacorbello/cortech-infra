apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: osint
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis
  namespace: osint
subsets:
  - addresses:
      - ip: 192.168.1.86
    ports:
      - port: 6379
