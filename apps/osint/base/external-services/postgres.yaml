apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: osint
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres
  namespace: osint
subsets:
  - addresses:
      - ip: 192.168.1.83
    ports:
      - port: 5432
