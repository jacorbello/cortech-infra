apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify
  namespace: osint
  labels:
    app: gotify
    app.kubernetes.io/part-of: osint-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotify
  template:
    metadata:
      labels:
        app: gotify
        app.kubernetes.io/part-of: osint-platform
    spec:
      containers:
        - name: gotify
          image: harbor.corbello.io/dockerhub-cache/gotify/server:latest
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - name: gotify-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: gotify-data
          persistentVolumeClaim:
            claimName: gotify-data
