apiVersion: apps/v1
kind: Deployment
metadata:
  name: piper
  namespace: tts
  labels:
    app: piper
    app.kubernetes.io/part-of: tts-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: piper
  template:
    metadata:
      labels:
        app: piper
        app.kubernetes.io/part-of: tts-platform
    spec:
      serviceAccountName: tts
      imagePullSecrets:
        - name: harbor-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - core-app
                      - compute
      containers:
        - name: piper
          image: harbor.corbello.io/tts/piper:1.0.0
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /voices
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /voices
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: extra-voices
              mountPath: /models/extra
      volumes:
        - name: extra-voices
          persistentVolumeClaim:
            claimName: piper-voices-extra
