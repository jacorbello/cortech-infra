apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro
  namespace: tts
  labels:
    app: kokoro
    app.kubernetes.io/part-of: tts-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kokoro
  template:
    metadata:
      labels:
        app: kokoro
        app.kubernetes.io/part-of: tts-platform
    spec:
      serviceAccountName: tts
      imagePullSecrets:
        - name: harbor-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - core-app
                      - compute
      containers:
        - name: kokoro
          image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
          ports:
            - containerPort: 8880
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 150
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v1/audio/voices
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
