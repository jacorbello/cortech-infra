apiVersion: v1
kind: Service
metadata:
  name: kokoro
  namespace: tts
  labels:
    app: kokoro
    app.kubernetes.io/part-of: tts-platform
spec:
  type: NodePort
  selector:
    app: kokoro
  ports:
    - name: http
      port: 8880
      targetPort: http
      nodePort: 30881
      protocol: TCP
