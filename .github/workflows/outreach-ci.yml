name: Outreach CI

on:
  pull_request:
    paths:
      - "apps/outreach-schema/**"
      - "apps/outreach-workflows/**"
      - "apps/postiz/**"
      - "apps/temporal/**"
      - "scripts/n8n/**"
      - "tests/n8n/**"
      - ".github/workflows/outreach-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/outreach-schema/**"
      - "apps/outreach-workflows/**"
      - "apps/postiz/**"
      - "apps/temporal/**"
      - "scripts/n8n/**"
      - "tests/n8n/**"

permissions:
  contents: read

jobs:
  schema:
    runs-on: cortech-infra-runner
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: outreach
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/outreach?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Install postgresql-client + dbmate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          sudo curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          sudo chmod +x /usr/local/bin/dbmate
          psql --version && dbmate --version
      - name: Apply migrations
        working-directory: apps/outreach-schema
        run: dbmate up
      - name: Rollback migrations (verify down paths work)
        working-directory: apps/outreach-schema
        run: |
          for _ in $(seq 1 6); do dbmate rollback; done
          dbmate up
      - name: Run trigger enforcement tests
        working-directory: apps/outreach-schema
        run: ./db/tests/run_tests.sh

  audit:
    runs-on: cortech-infra-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements-test.txt
      - name: Run audit tests
        run: python -m pytest tests/n8n/ -v --no-cov
      - name: Run audit against repo workflows
        run: python -m scripts.n8n.audit_credentials apps/outreach-workflows/

  sha256-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: SHA-256 drift + RFC 6234 + HMAC audit
        run: node apps/outreach-workflows/tests/sha256-audit/audit.js
      - name: PLATFORM_MAP drift guard (review.json)
        run: node apps/outreach-workflows/tests/sha256-audit/platform-map-audit.js
      - name: Hash-payload concatenation-order drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/hash-payload-order.js
      - name: Public self-loop URL drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/no-public-self-loop.js
      - name: Slack blocksUi shape drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/blocksui-shape-audit.js
      - name: Webhook rawBody shape guard
        run: node apps/outreach-workflows/tests/sha256-audit/webhook-rawbody-audit.js
      - name: Slack signature end-to-end (Go-encoded body)
        run: node apps/outreach-workflows/tests/sha256-audit/slack-signature-end-to-end.js
      - name: Normalize RSS follow.it-unwrap drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/normalize-rss-no-followit.js
      - name: Normalize RSS thin-excerpt-skip drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/normalize-rss-thin-excerpt-skip.js
      - name: Code-node return-shape drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/code-node-return-shape-audit.js
      - name: Slack platform_key propagation drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/slack-platform-key-propagation.js
      - name: Draft prompt invariants drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/draft-prompt-invariants.js
      - name: Workflow D no-rollup drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/workflow-d-no-rollup-audit.js
      - name: Poll workflow status-writes drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/poll-workflow-status-writes-audit.js
      - name: Postiz list-window drift guard
        run: node apps/outreach-workflows/tests/sha256-audit/postiz-list-window-audit.js
      - name: Poll reconcile state-machine sandbox test
        run: node apps/outreach-workflows/tests/sha256-audit/poll-reconcile-state-machine.js

  manifests-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      # Render Kustomize/Helm manifests and YAML-parse them. We deliberately
      # skip `kubectl apply --dry-run` because GitHub-hosted runners have no
      # cluster and kubectl still does server-side API discovery even with
      # --validate=false. CRD-typed manifests (Traefik IngressRoute,
      # InfisicalSecret, ServiceMonitor) are listed as "skipped" — ArgoCD
      # validates them against the live cluster at sync time.
      - name: Build Postiz manifests
        run: kustomize build apps/postiz/overlays/production > /tmp/postiz-rendered.yaml

      - name: Validate Postiz manifests (YAML parse + built-in kind allow-list)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/postiz-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          drop = sorted({d.get("kind") for d in docs if d.get("kind") not in builtin})
          missing = [d for d in docs if not d.get("kind") or not d.get("apiVersion")]
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)} (skipped kinds: {drop})")
          if missing:
              sys.exit(f"FAIL: {len(missing)} doc(s) missing kind/apiVersion")
          EOF

      - name: Lint Temporal Helm values
        run: |
          helm repo add temporalio https://go.temporal.io/helm-charts
          helm template temporal temporalio/temporal \
            --version 0.74.0 \
            -f apps/temporal/values.yaml \
            --namespace plotlens-marketing \
            > /tmp/temporal-rendered.yaml

      - name: Validate Temporal manifests (YAML parse + built-in kind allow-list)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/temporal-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          drop = sorted({d.get("kind") for d in docs if d.get("kind") not in builtin})
          missing = [d for d in docs if not d.get("kind") or not d.get("apiVersion")]
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)} (skipped kinds: {drop})")
          if missing:
              sys.exit(f"FAIL: {len(missing)} doc(s) missing kind/apiVersion")
          EOF

      - name: Build Temporal extras
        run: kustomize build apps/temporal/extras > /tmp/temporal-extras-rendered.yaml

      - name: Validate Temporal extras (YAML parse + built-in kind allow-list)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/temporal-extras-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          drop = sorted({d.get("kind") for d in docs if d.get("kind") not in builtin})
          missing = [d for d in docs if not d.get("kind") or not d.get("apiVersion")]
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)} (skipped kinds: {drop})")
          if missing:
              sys.exit(f"FAIL: {len(missing)} doc(s) missing kind/apiVersion")
          EOF
