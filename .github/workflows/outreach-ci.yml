name: Outreach CI

on:
  pull_request:
    paths:
      - "apps/outreach-schema/**"
      - "apps/outreach-workflows/**"
      - "apps/postiz/**"
      - "apps/temporal/**"
      - "scripts/n8n/**"
      - "tests/n8n/**"
      - ".github/workflows/outreach-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/outreach-schema/**"
      - "apps/outreach-workflows/**"
      - "apps/postiz/**"
      - "apps/temporal/**"
      - "scripts/n8n/**"
      - "tests/n8n/**"

permissions:
  contents: read

jobs:
  schema:
    runs-on: cortech-infra-runner
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: outreach
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/outreach?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Install dbmate
        run: |
          sudo curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          sudo chmod +x /usr/local/bin/dbmate
      - name: Apply migrations
        working-directory: apps/outreach-schema
        run: dbmate up
      - name: Rollback migrations (verify down paths work)
        working-directory: apps/outreach-schema
        run: |
          for _ in $(seq 1 6); do dbmate rollback; done
          dbmate up
      - name: Run trigger enforcement tests
        working-directory: apps/outreach-schema
        run: ./db/tests/run_tests.sh

  audit:
    runs-on: cortech-infra-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements-test.txt
      - name: Run audit tests
        run: python -m pytest tests/n8n/ -v --no-cov
      - name: Run audit against repo workflows
        run: python -m scripts.n8n.audit_credentials apps/outreach-workflows/

  manifests-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      # Postiz: render the production overlay and dry-run apply.
      # Skip CRD-typed manifests (Traefik IngressRoute, InfisicalSecret, ServiceMonitor)
      # — those CRDs aren't available in CI but ArgoCD validates them against the live cluster.
      - name: Build Postiz manifests
        run: kustomize build apps/postiz/overlays/production > /tmp/postiz-rendered.yaml

      - name: Validate Postiz manifests (built-in kinds only)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/postiz-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          drop = [d.get("kind") for d in docs if d.get("kind") not in builtin]
          with open("/tmp/postiz-builtin.yaml","w") as f:
              yaml.safe_dump_all(keep, f)
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)} (skipped kinds: {sorted(set(drop))})")
          EOF
          kubectl apply --dry-run=client --validate=false -f /tmp/postiz-builtin.yaml

      # Temporal: render the Helm chart with the project values and dry-run apply.
      # Same CRD caveat — strip Traefik IngressRoute / InfisicalSecret / ServiceMonitor.
      - name: Lint Temporal Helm values
        run: |
          helm repo add temporalio https://go.temporal.io/helm-charts
          helm template temporal temporalio/temporal \
            --version 0.74.0 \
            -f apps/temporal/values.yaml \
            --namespace plotlens-marketing \
            > /tmp/temporal-rendered.yaml

      - name: Validate Temporal manifests (built-in kinds only)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/temporal-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          drop = [d.get("kind") for d in docs if d.get("kind") not in builtin]
          with open("/tmp/temporal-builtin.yaml","w") as f:
              yaml.safe_dump_all(keep, f)
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)} (skipped kinds: {sorted(set(drop))})")
          EOF
          kubectl apply --dry-run=client --validate=false -f /tmp/temporal-builtin.yaml

      - name: Build Temporal extras
        run: kustomize build apps/temporal/extras > /tmp/temporal-extras-rendered.yaml

      - name: Validate Temporal extras (built-in kinds only)
        run: |
          python3 - <<'EOF'
          import yaml, sys
          builtin = {"Namespace","Deployment","StatefulSet","Service","ConfigMap","Secret","PersistentVolumeClaim","Pod","Job","CronJob","Ingress","ServiceAccount","Role","RoleBinding","ClusterRole","ClusterRoleBinding","NetworkPolicy"}
          with open("/tmp/temporal-extras-rendered.yaml") as f:
              docs = [d for d in yaml.safe_load_all(f) if d]
          keep = [d for d in docs if d.get("kind") in builtin]
          with open("/tmp/temporal-extras-builtin.yaml","w") as f:
              yaml.safe_dump_all(keep, f)
          print(f"kept={len(keep)} skipped={len(docs)-len(keep)}")
          EOF
          if [ -s /tmp/temporal-extras-builtin.yaml ]; then
            kubectl apply --dry-run=client --validate=false -f /tmp/temporal-extras-builtin.yaml
          else
            echo "No built-in kinds in temporal/extras — all CRDs (expected)"
          fi
