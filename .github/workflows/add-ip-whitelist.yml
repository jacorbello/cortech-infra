name: Add IP to Whitelist

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'IPv4 address to allow (e.g. 203.0.113.5)'
        required: true
        type: string
      service:
        description: 'Service to whitelist IP for'
        required: true
        type: choice
        options:
          - global
          - osint
      reason:
        description: 'Short description (used in commit message and as comment)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  add-ip:
    runs-on: [self-hosted, linux, cortech-infra-deploy]
    env:
      INPUT_IP: ${{ inputs.ip }}
      INPUT_SERVICE: ${{ inputs.service }}
      INPUT_REASON: ${{ inputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends openssh-client rsync

      - name: Validate IPv4 address
        run: |
          if ! echo "$INPUT_IP" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
            echo "::error::Invalid IPv4 address: $INPUT_IP"
            exit 1
          fi
          IFS='.' read -ra OCTETS <<< "$INPUT_IP"
          for octet in "${OCTETS[@]}"; do
            if [ "$octet" -gt 255 ]; then
              echo "::error::Invalid IPv4 address: octet $octet is out of range (0-255)"
              exit 1
            fi
          done

      - name: Determine target file
        id: target
        run: |
          if [ "$INPUT_SERVICE" = "global" ]; then
            echo "file=proxy/conf.d/whitelist-global.conf" >> "$GITHUB_OUTPUT"
          else
            echo "file=proxy/conf.d/whitelist-${INPUT_SERVICE}-ips.conf" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for duplicate
        id: check
        run: |
          ESCAPED_IP=$(echo "$INPUT_IP" | sed 's/\./\\./g')
          if grep -qE "^${ESCAPED_IP}[[:space:]]" "${{ steps.target.outputs.file }}"; then
            echo "::notice::IP $INPUT_IP already present in ${{ steps.target.outputs.file }} — skipping"
            echo "already_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Append IP entry
        if: steps.check.outputs.already_present == 'false'
        run: |
          echo "${INPUT_IP}  1;  # ${INPUT_REASON}" >> "${{ steps.target.outputs.file }}"

      - name: Commit and push
        if: steps.check.outputs.already_present == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.target.outputs.file }}"
          git commit -m "chore(proxy): allow ${INPUT_IP} on ${INPUT_SERVICE} — ${INPUT_REASON}"
          git push

      - name: Sync whitelist files to proxy
        run: |
          rsync -av \
            -e "ssh -i /ssh-keys/id_ed25519 -o UserKnownHostsFile=/ssh-keys/known_hosts" \
            proxy/conf.d/whitelist*.conf \
            root@192.168.1.100:/etc/nginx/conf.d/

      - name: Test and reload NGINX
        run: |
          ssh -i /ssh-keys/id_ed25519 -o UserKnownHostsFile=/ssh-keys/known_hosts \
            root@192.168.1.100 "nginx -t && nginx -s reload"
