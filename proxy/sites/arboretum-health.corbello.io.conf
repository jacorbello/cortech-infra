# arboretum-health.corbello.io -> K3s Traefik -> wordpress (arboretum-health ns)
server {
    server_name arboretum-health.corbello.io;

    client_max_body_size 64M;

    location / {
        proxy_pass http://192.168.1.90:30278;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/arboretum-health.corbello.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arboretum-health.corbello.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = arboretum-health.corbello.io) {
        return 301 https://$host$request_uri;
    }
    server_name arboretum-health.corbello.io;
    listen 80;
    return 404;
}
