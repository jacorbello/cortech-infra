# temporal.corbello.io -> K3s Traefik -> temporal-web (plotlens-marketing ns)
server {
    server_name temporal.corbello.io;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://192.168.1.90:30278;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Forwarded-Host $server_name;
        proxy_buffering off;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/temporal.corbello.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/temporal.corbello.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = temporal.corbello.io) {
        return 301 https://$host$request_uri;
    }

    server_name temporal.corbello.io;
    listen 80;
    return 404;
}
