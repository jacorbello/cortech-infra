# proxy/conf.d/whitelist.conf
# Defines per-service geo variables for IP whitelisting.
# Each protected service has its own geo variable so IPs are not shared across services.
#
# DEPLOYMENT: proxy/conf.d/ in this repo maps to /etc/nginx/conf.d/ on LXC 100 (192.168.1.100).
# The include paths below are absolute for NGINX on the host. Keep them in sync if the
# deployment target changes.
#
# IP EVALUATION: geo blocks evaluate $remote_addr by default. LXC 100 is the public TLS
# terminator (not behind another proxy), so $remote_addr is the real client IP for all
# inbound traffic. If you add a geo block for a service that is only accessible via an
# internal load balancer or VIP (e.g., 192.168.1.90), verify that $remote_addr still
# represents the originating client and not the internal hop.
#
# HOW TO ADD A NEW PROTECTED SERVICE:
#   1. Create proxy/conf.d/whitelist-<service>-ips.conf with a "# managed by GitHub Actions" placeholder
#   2. Add a geo $allowed_<service> block here (include global + service IPs)
#   3. Add `if ($allowed_<service> = 0) { return 444; }` to the service's server block
#   4. Add the service name to the workflow_dispatch choices in both GitHub Actions workflows

geo $allowed_osint {
    default 0;
    include /etc/nginx/conf.d/whitelist-global.conf;
    include /etc/nginx/conf.d/whitelist-osint-ips.conf;
}
